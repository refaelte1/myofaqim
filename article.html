<meta charset="UTF-8">

<meta name="description" id="page-desc" content="כתבה באתר אופקים שלי">
<link rel="canonical" id="page-canonical" href="https://myofaqim.co.il/article">
<meta property="og:image" content="https://myofaqim.co.il/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="אופקים שלי - הפלטפורמה הקהילתית של העיר אופקים">
<meta property="og:locale" content="he_IL">
<meta property="og:site_name" content="אופקים שלי">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://myofaqim.co.il/og-image.png">
<link rel="icon" type="image/png" href="/favicon-32.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1A2E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
<script type="application/ld+json" id="art-jsonld"></script>

<style>
.article-hero{background:var(--paper);padding:48px 0 32px;border-bottom:1px solid var(--line)}
.article-hero .breadcrumb{margin-bottom:18px}
.article-cat-tag{display:inline-block;font-size:11px;font-weight:800;color:var(--gold-dk);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
.article-title{font-family:var(--sans);font-size:clamp(32px,5vw,52px);font-weight:900;color:var(--navy);letter-spacing:-0.02em;line-height:1.15;margin-bottom:18px;max-width:820px}
.article-excerpt{font-size:19px;color:var(--ink-soft);line-height:1.6;max-width:720px;margin-bottom:24px;font-weight:400}
.article-meta-bar{display:flex;gap:20px;font-size:13px;color:var(--ink-mute);font-weight:600;padding-top:24px;border-top:1px solid var(--line);flex-wrap:wrap}
.article-meta-bar .item{display:inline-flex;align-items:center;gap:6px}

.article-cover{margin:32px 0;background:var(--cream-warm);overflow:hidden;border:1px solid var(--line)}
.article-cover img{width:100%;height:auto;display:block;max-height:480px;object-fit:cover}

.article-content{max-width:760px;margin:0 auto;padding:32px 0 80px}
.article-prose{font-size:17px;line-height:1.9;color:var(--ink);font-family:var(--sans)}
.article-prose p{margin-bottom:20px}
.article-prose h2{font-family:var(--sans);font-size:28px;font-weight:900;color:var(--navy);letter-spacing:-0.01em;margin:36px 0 18px;line-height:1.2}
.article-prose h3{font-family:var(--sans);font-size:22px;font-weight:700;color:var(--navy);margin:28px 0 14px;line-height:1.3}
.article-prose blockquote{border-right:3px solid var(--gold);padding:8px 20px;margin:24px 0;font-family:var(--sans);font-size:20px;font-style:italic;color:var(--ink-soft);line-height:1.7}
.article-prose ul,.article-prose ol{margin:0 24px 20px 0;padding:0}
.article-prose li{margin-bottom:10px}
.article-prose a{color:var(--gold-dk);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;transition:color .15s}
.article-prose a:hover{color:var(--navy)}
.article-prose img{max-width:100%;height:auto;margin:24px 0;border:1px solid var(--line)}
.article-prose strong{color:var(--navy);font-weight:700}

.share-bar{background:var(--cream-warm);border:1px solid var(--line);padding:24px 32px;margin:48px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.share-bar .label{font-family:var(--sans);font-weight:700;color:var(--navy);font-size:16px}
.share-bar .buttons{display:flex;gap:8px}
.share-btn{padding:9px 18px;font-size:12px;font-weight:700;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-family:var(--sans);border-radius:2px;color:var(--ink-soft);transition:all .15s}
.share-btn:hover{border-color:var(--navy);color:var(--navy)}

.related-section{background:var(--paper);padding:48px 0;border-top:1px solid var(--line);margin-top:32px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:24px}
.rel-card{background:var(--paper);border:1px solid var(--line);padding:20px;cursor:pointer;transition:all .2s}
.rel-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.rel-tag{font-size:10px;font-weight:800;color:var(--gold-dk);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.rel-title{font-family:var(--sans);font-size:16px;font-weight:700;color:var(--navy);line-height:1.3;letter-spacing:-0.01em}
.rel-date{font-size:11px;color:var(--ink-mute);margin-top:8px}
</style>
</head>
<body>
<div id="header-placeholder"></div>

<section class="article-hero">
  <div class="container">
    <div id="article-head">
      <div class="loader">טוען כתבה...</div>
    </div>
  </div>
</section>

<div id="article-cover-area"></div>

<article class="article-content">
  <div class="container">
    <div class="article-prose" id="article-body"></div>

    <div class="share-bar" id="share-bar" style="display:none">
      <div class="label">שתפו את הכתבה</div>
      <div class="buttons">
        <button class="share-btn" onclick="shareWhatsApp()">WhatsApp</button>
        <button class="share-btn" onclick="shareFacebook()">Facebook</button>
        <button class="share-btn" onclick="copyLink()">העתקת קישור</button>
      </div>
    </div>
  </div>
</article>

<section class="related-section" id="related-section" style="display:none">
  <div class="container">
    <div class="section-head" style="margin-bottom:0">
      <div class="eyebrow">המשך קריאה</div>
      <h2>כתבות <em>נוספות</em></h2>
    </div>
    <div class="related-grid" id="related-grid"></div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="/site.js"></script>
<script>
  const CAT_LABELS = { news:'חדשות', announcement:'הודעה', event:'אירוע', community:'קהילה' };
  let sb, article = null;

  function formatBody(content) {
    if (!content) return '';
    // Simple Markdown-lite
    return content
      .split(/\n\n+/)
      .map(p => {
        if (/^##\s/.test(p)) return `<h2>${esc(p.replace(/^##\s/, ''))}</h2>`;
        if (/^###\s/.test(p)) return `<h3>${esc(p.replace(/^###\s/, ''))}</h3>`;
        if (/^>\s/.test(p)) return `<blockquote>${esc(p.replace(/^>\s/, ''))}</blockquote>`;
        if (/^[-*]\s/m.test(p)) {
          const items = p.split('\n').filter(x => /^[-*]\s/.test(x)).map(x => `<li>${esc(x.replace(/^[-*]\s/, ''))}</li>`).join('');
          return `<ul>${items}</ul>`;
        }
        return `<p>${esc(p).replace(/\n/g, '<br>')}</p>`;
      })
      .join('\n');
  }

  async function loadArticle() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
      $('article-head').innerHTML = '<div class="empty"><h3>לא נמצאה כתבה</h3><p><a href="/news" style="color:var(--gold-dk)">חזרה לחדשות</a></p></div>';
      return;
    }
    try {
      let { data } = await sb.from('news_articles').select('*').eq('slug', id).maybeSingle();
      if (!data) {
        const r = await sb.from('news_articles').select('*').eq('id', id).maybeSingle();
        data = r.data;
      }
      if (!data) {
        $('article-head').innerHTML = '<div class="empty"><h3>הכתבה לא נמצאה</h3><p><a href="/news" style="color:var(--gold-dk)">חזרה לחדשות</a></p></div>';
        return;
      }
      article = data;

      const date = data.published_at ? new Date(data.published_at).toLocaleDateString('he-IL', { day:'numeric', month:'long', year:'numeric' }) : '';

      $('article-head').innerHTML = `
        <div class="breadcrumb"><a href="/">דף הבית</a> · <a href="/news">חדשות</a> · <span>${esc(data.title.slice(0, 40))}${data.title.length > 40 ? '…' : ''}</span></div>
        <div class="article-cat-tag">${CAT_LABELS[data.category] || data.category || 'חדשות'}</div>
        <h1 class="article-title">${esc(data.title)}</h1>
        ${data.excerpt ? `<p class="article-excerpt">${esc(data.excerpt)}</p>` : ''}
        <div class="article-meta-bar">
          ${data.author_name ? `<span class="item">מאת ${esc(data.author_name)}</span>` : ''}
          ${date ? `<span class="item">${date}</span>` : ''}
          ${data.reading_time ? `<span class="item">${data.reading_time} דקות קריאה</span>` : ''}
        </div>`;

      if (data.cover_image_url) {
        $('article-cover-area').innerHTML = `
          <div class="container"><div class="article-cover"><img src="${esc(data.cover_image_url)}" alt="${esc(data.title)}"></div></div>`;
      }

      $('article-body').innerHTML = formatBody(data.content || '');
      $('share-bar').style.display = '';

      // SEO
      $('page-title').textContent = data.title + ' | אופקים שלי';
      document.getElementById('page-desc').setAttribute('content', (data.excerpt || data.title).slice(0, 160));
      const url = window.location.origin + '/article?id=' + (data.slug || data.id);
      document.getElementById('page-canonical').setAttribute('href', url);

      // JSON-LD
      $('art-jsonld').textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        "headline": data.title,
        "description": data.excerpt || '',
        "datePublished": data.published_at,
        "image": data.cover_image_url || undefined,
        "author": { "@type": "Organization", "name": "אופקים שלי" },
        "publisher": { "@type": "Organization", "name": "MyOfaqim.co.il" }
      });

      // Related
      loadRelated(data);

    } catch(e) {
      $('article-head').innerHTML = `<div class="empty"><h3>שגיאה</h3><p>${esc(e.message)}</p></div>`;
    }
  }

  async function loadRelated(current) {
    try {
      const { data } = await sb.from('news_articles').select('id,slug,title,category,published_at')
        .eq('is_published', true)
        .neq('id', current.id)
        .order('published_at', { ascending: false }).limit(3);
      if (data && data.length) {
        $('related-section').style.display = '';
        $('related-grid').innerHTML = data.map(a => {
          const d = a.published_at ? new Date(a.published_at).toLocaleDateString('he-IL') : '';
          return `
            <article class="rel-card" onclick="window.location.href='/article?id=${esc(a.slug || a.id)}'">
              <div class="rel-tag">${CAT_LABELS[a.category] || a.category || 'חדשות'}</div>
              <h3 class="rel-title">${esc(a.title)}</h3>
              <div class="rel-date">${d}</div>
            </article>`;
        }).join('');
      }
    } catch(e) { /* ignore */ }
  }

  function shareWhatsApp() {
    if (!article) return;
    const text = encodeURIComponent(article.title + ' | אופקים שלי');
    window.open(`https://wa.me/?text=${text}%20${encodeURIComponent(window.location.href)}`, '_blank');
  }
  function shareFacebook() {
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank');
  }
  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => alert('הקישור הועתק'));
  }

  async function artInit() {
    sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);
    loadArticle();
  }

  window.shareWhatsApp = shareWhatsApp;
  window.shareFacebook = shareFacebook;
  window.copyLink = copyLink;

  if (document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', () => { if(window.supabase) artInit(); else window.addEventListener('load', artInit, {once:true}); });
  else { if(window.supabase) artInit(); else window.addEventListener('load', artInit, {once:true}); }
</script>
</body>
</html>
