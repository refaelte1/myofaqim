<body>

<section class="page-hero">
  <div class="container">

<main class="page-main">
  <div class="container">

    <div class="tools-bar">
      <input type="text" id="search" class="search-input" placeholder="חפשו קבוצה..." oninput="renderGroups()">

    <div class="cat-bar" id="cat-bar">
      <button class="cat-chip active" data-cat="all" onclick="filterCat('all', this)">הכל</button>

      <button class="cat-chip" data-cat="neighborhood" onclick="filterCat('neighborhood', this)">שכונות</button>
      <button class="cat-chip" data-cat="parents" onclick="filterCat('parents', this)">הורים</button>
      <button class="cat-chip" data-cat="trade" onclick="filterCat('trade', this)">יד שנייה</button>
      <button class="cat-chip" data-cat="religious" onclick="filterCat('religious', this)">דת</button>
      <button class="cat-chip" data-cat="events" onclick="filterCat('events', this)">אירועים</button>
      <button class="cat-chip" data-cat="business" onclick="filterCat('business', this)">עסקים</button>
    </div>

    <div id="result-count" class="result-count"></div>

    <div id="groups-area" class="content-grid">
      <div class="state-loading">טוען קבוצות...</div>

      <p>נשמח להוסיף אותה לאינדקס. צרו קשר ונעדכן.</p>
      <div class="cta-row">
        <a href="tel:0542338233" class="btn-gold">054-233-8233</a>
        <a href="https://wa.me/972542338233" target="_blank" rel="noopener" class="btn-filled">WhatsApp</a>
      </div>
    </div>

  </div>
</main>

<div id="footer-placeholder"></div>

<script src="/site.js"></script>
<script>
'use strict';

const CAT_LABELS = {
  general: 'כללי',
  neighborhood: 'שכונה',
  parents: 'הורים',
  trade: 'יד שנייה',
  religious: 'דת',
  torah: 'דת',
  events: 'אירועים',
  business: 'עסקים',
  other: 'אחר'
};

let waSb, allGroups = [], currentCat = 'all';

async function initWa() {
  if (!window.supabase || !window.SB_URL) { setTimeout(initWa, 100); return; }
  waSb = window.supabase.createClient(window.SB_URL, window.SB_KEY);
  await loadGroups();
}

async function loadGroups() {
  try {
    const { data, error } = await waSb.from('whatsapp_groups').select('*')
      .order('member_count', { ascending: false, nullsFirst: false });
    if (error) throw error;
    allGroups = (data || []).filter(g => g.is_active !== false);
    renderGroups();
  } catch(e) {
    console.error('[whatsapp-groups] error:', e);
    document.getElementById('groups-area').innerHTML =
      '<div class="state-empty"><h3>בעיה זמנית</h3><p>לא הצלחנו לטעון את הקבוצות. נסו לרענן.</p></div>';
  }
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderGroups();
}

function renderGroups() {
  const search = (document.getElementById('search').value || '').toLowerCase();
  let items = allGroups;

  if (currentCat !== 'all') {
    items = items.filter(g => {
      // טיפול ב-torah <-> religious
      if (currentCat === 'religious') return g.category === 'religious' || g.category === 'torah';
      return g.category === currentCat;
    });
  }

  if (search) {
    items = items.filter(g => {
      const text = [g.name, g.description].filter(Boolean).join(' ').toLowerCase();
      return text.includes(search);
    });
  }

  const rc = document.getElementById('result-count');
  rc.innerHTML = `נמצאו <strong>${items.length}</strong> קבוצות`;

  const area = document.getElementById('groups-area');
  if (!items.length) {
    area.innerHTML = '<div class="state-empty"><h3>אין קבוצות בקטגוריה זו</h3><p>נסו קטגוריה אחרת או הקלידו חיפוש שונה.</p></div>';
    return;
  }

  area.innerHTML = items.map(g => {
    const catLabel = CAT_LABELS[g.category] || g.category || 'אחר';
    const members = g.member_count
      ? (window.fmt ? window.fmt(g.member_count) : g.member_count) + ' חברים'
      : '';
    return `
      <div class="content-card">
        <div class="content-card-header">
          <span class="content-card-tag green">${window.esc ? window.esc(catLabel) : catLabel}</span>
        </div>
        <h3>${window.esc ? window.esc(g.name || '') : g.name}</h3>
        ${g.description ? `<p>${window.esc ? window.esc(g.description) : g.description}</p>` : ''}
        ${members ? `<div class="card-meta"><span>${members}</span></div>` : ''}
        ${g.invite_link
          ? `<div class="card-actions">
              <a href="${window.esc ? window.esc(g.invite_link) : g.invite_link}" target="_blank" rel="noopener" class="card-btn whatsapp">
                הצטרפות לקבוצה
              </a>
            </div>`
          : ''}
      </div>
    `;
  }).join('');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initWa);
} else {
  initWa();
}
</script>
