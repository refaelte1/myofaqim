<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="אופקים שלי">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>שליחת SMS | אופקים שלי</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="/favicon-32.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  :root {
    --navy: #1A2E5C;
    --blue: #2563EB;
    --orange: #F59E0B;
    --orange-dk: #D97706;
    --green: #65A30D;
    --cream: #FBFAF7;
    --paper: #FFFFFF;
    --ink: #1A1A1A;
    --ink-soft: #4A4A4A;
    --ink-mute: #8A8A8A;
    --line: #E5E7EB;
    --red: #DC2626;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    color: var(--ink);
    direction: rtl;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header {
    max-width: 800px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand img {
    height: 44px;
    width: auto;
  }
  .brand-text {
    font-weight: 900;
    font-size: 20px;
    color: var(--navy);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand-text .accent { color: var(--blue); }
  .brand-sub {
    font-size: 11px;
    color: var(--blue);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 4px;
  }
  .back-link {
    color: var(--blue);
    text-decoration: none;
    font-weight: 800;
    font-size: 13px;
  }

  .card {
    max-width: 800px;
    margin: 0 auto 16px;
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--line);
    padding: 24px;
    box-shadow: 0 4px 16px rgba(26, 46, 92, 0.04);
  }

  h1 {
    font-size: 26px;
    font-weight: 900;
    color: var(--navy);
    margin: 0 0 8px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 .icon {
    width: 40px;
    height: 40px;
    background: var(--orange);
    color: #fff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .subtitle {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 24px;
  }

  /* ─── סטטוס ─── */
  .status-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .status-box {
    background: var(--cream);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .status-box .num {
    font-size: 28px;
    font-weight: 900;
    color: var(--navy);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .status-box .lbl {
    font-size: 11px;
    color: var(--ink-mute);
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ─── טופס ─── */
  .form-group {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 8px;
  }
  label .hint {
    font-weight: 500;
    color: var(--ink-mute);
    font-size: 11px;
    margin-right: 8px;
  }

  select, textarea, input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    transition: border-color 0.2s;
  }
  select:focus, textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--blue);
  }
  textarea {
    resize: vertical;
    min-height: 100px;
    font-family: inherit;
    line-height: 1.6;
  }

  .char-counter {
    text-align: left;
    font-size: 11px;
    color: var(--ink-mute);
    font-weight: 700;
    margin-top: 4px;
    direction: ltr;
  }
  .char-counter.warning { color: var(--orange-dk); }
  .char-counter.error { color: var(--red); }

  /* ─── preview ─── */
  .preview-box {
    background: var(--cream);
    border: 1.5px dashed var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 12px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    min-height: 60px;
  }
  .preview-box .empty {
    color: var(--ink-mute);
    font-style: italic;
    font-size: 13px;
  }

  /* ─── כפתורים ─── */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-weight: 900;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dk) 100%);
    color: #fff;
    box-shadow: 0 8px 20px rgba(245, 158, 11, 0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-secondary {
    background: #fff;
    border: 1.5px solid var(--line);
    color: var(--navy);
  }
  .btn-secondary:hover { border-color: var(--blue); }

  /* ─── הודעות ─── */
  .alert {
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 16px;
    display: none;
  }
  .alert.show { display: block; }
  .alert.success {
    background: rgba(101, 163, 13, 0.1);
    color: var(--green);
    border-right: 3px solid var(--green);
  }
  .alert.error {
    background: rgba(220, 38, 38, 0.1);
    color: var(--red);
    border-right: 3px solid var(--red);
  }
  .alert.warning {
    background: rgba(245, 158, 11, 0.1);
    color: var(--orange-dk);
    border-right: 3px solid var(--orange);
  }

  /* ─── טמפלטים ─── */
  .templates {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .template-btn {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .template-btn:hover {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }

  /* ─── תוצאות שליחה ─── */
  .results {
    max-height: 300px;
    overflow-y: auto;
    margin-top: 16px;
    display: none;
  }
  .results.show { display: block; }
  .result-row {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-row .phone { font-family: monospace; direction: ltr; }
  .result-row.success .status { color: var(--green); }
  .result-row.error .status { color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <a href="/admin" class="brand" style="text-decoration: none;">
    <img src="/logo.png" alt="לוגו" onerror="this.style.display='none'">
    <div>
      <div class="brand-text">אופקים <span class="accent">שלי</span></div>
      <div class="brand-sub">MYOFAQIM.CO.IL</div>
    </div>
  </a>
  <a href="/admin" class="back-link">← חזרה לפאנל אדמין</a>
</div>

<!-- ─── סטטוס נמענים ─── -->
<div class="card">
  <h1>
    <span class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </span>
    שליחת SMS לנמענים
  </h1>
  <p class="subtitle">שלח הודעת SMS לקהל הנמענים שאישרו לקבל הודעות. החיוב לפי 019.</p>

  <div class="status-row">
    <div class="status-box">
      <div class="num" id="cnt-all">—</div>
      <div class="lbl">סה"כ נרשמים</div>
    </div>
    <div class="status-box">
      <div class="num" id="cnt-sms">—</div>
      <div class="lbl">מאשרים SMS</div>
    </div>
    <div class="status-box">
      <div class="num" id="cnt-residents">—</div>
      <div class="lbl">תושבים</div>
    </div>
    <div class="status-box">
      <div class="num" id="cnt-business">—</div>
      <div class="lbl">עסקים</div>
    </div>
  </div>
</div>

<!-- ─── טופס שליחה ─── -->
<div class="card">
  <div class="alert" id="alert"></div>

  <div class="form-group">
    <label>קהל יעד <span class="hint">(רק מי שאישר לקבל SMS)</span></label>
    <select id="audience">
      <option value="all">כל הנמענים (תושבים + עסקים + מקצוע)</option>
      <option value="resident">רק תושבים</option>
      <option value="business_owner">רק בעלי עסקים</option>
      <option value="professional">רק בעלי מקצוע</option>
    </select>
  </div>

  <div class="form-group">
    <label>תוכן ההודעה</label>
    <textarea id="message" placeholder="לדוגמה: שלום, מבצעי סוף שבוע באופקים שלי! היכנסו ל-myofaqim.co.il" maxlength="300"></textarea>
    <div class="char-counter" id="char-counter">0 / 70 תווים · 1 הודעה</div>

    <div class="templates">
      <button type="button" class="template-btn" onclick="useTemplate('weekly')">📅 מבצעי השבוע</button>
      <button type="button" class="template-btn" onclick="useTemplate('event')">🎉 אירוע חדש</button>
      <button type="button" class="template-btn" onclick="useTemplate('reminder')">⏰ תזכורת</button>
      <button type="button" class="template-btn" onclick="useTemplate('news')">📰 חדשות מהעיר</button>
    </div>
  </div>

  <div class="form-group">
    <label>תצוגה מקדימה</label>
    <div class="preview-box" id="preview">
      <span class="empty">ההודעה תופיע כאן...</span>
    </div>
  </div>

  <!-- עלות מוערכת -->
  <div class="status-box" style="background: rgba(245, 158, 11, 0.08); border: 1px solid var(--orange);">
    <div style="display: flex; justify-content: space-around; align-items: center;">
      <div>
        <div class="num" id="recipients-count" style="color: var(--orange-dk);">0</div>
        <div class="lbl">נמענים</div>
      </div>
      <div style="height: 32px; width: 1px; background: var(--line);"></div>
      <div>
        <div class="num" id="estimated-cost" style="color: var(--orange-dk);">0 ₪</div>
        <div class="lbl">עלות מוערכת</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" onclick="testSms()">📱 שלח בדיקה אליי</button>
    <button class="btn btn-primary" id="send-btn" onclick="sendBroadcast()" disabled>
      🚀 שלח לכל הנמענים
    </button>
  </div>

  <div class="results" id="results"></div>
</div>

<!-- ─── חיבור Supabase ─── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // window.SB_URL מ-site.js (window.SB_URL)
  // window.SB_KEY מ-site.js (window.SB_KEY)
  const sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);
  const ADMIN_EMAIL = 'refael@tedgi.co.il';

  let allSubs = [];

  // מחזיר access_token של אדמין מאומת, או null
  async function getAdminToken() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return null;
    if ((session.user.email || '').toLowerCase() !== ADMIN_EMAIL) return null;
    return session.access_token;
  }

  // ─── טעינת נמענים ─────────────────────────────────
  async function loadStats() {
    const { data, error } = await sb
      .from('newsletter_subscribers')
      .select('subscriber_type, phone, wants_sms, status')
      .eq('status', 'confirmed')
      .not('phone', 'is', null);

    if (error) {
      console.error('Failed to load subs:', error);
      return;
    }

    allSubs = data || [];

    document.getElementById('cnt-all').textContent = allSubs.length;
    document.getElementById('cnt-sms').textContent = allSubs.filter(s => s.wants_sms).length;
    document.getElementById('cnt-residents').textContent =
      allSubs.filter(s => s.subscriber_type === 'resident' && s.wants_sms).length;
    document.getElementById('cnt-business').textContent =
      allSubs.filter(s => s.subscriber_type === 'business_owner' && s.wants_sms).length;

    updatePreview();
  }

  // ─── תצוגה מקדימה + ספירה ──────────────────────────
  function updatePreview() {
    const audience = document.getElementById('audience').value;
    const msg = document.getElementById('message').value.trim();

    // ספירת נמענים
    let recipients = allSubs.filter(s => s.wants_sms);
    if (audience !== 'all') {
      recipients = recipients.filter(s => s.subscriber_type === audience);
    }

    document.getElementById('recipients-count').textContent = recipients.length;

    // עלות מוערכת (~0.12 ₪ להודעה בעברית)
    const segments = countSegments(msg);
    const cost = (recipients.length * segments * 0.12).toFixed(2);
    document.getElementById('estimated-cost').textContent = cost + ' ₪';

    // תצוגה מקדימה
    const preview = document.getElementById('preview');
    if (msg) {
      preview.innerHTML = msg.replace(/\n/g, '<br>');
    } else {
      preview.innerHTML = '<span class="empty">ההודעה תופיע כאן...</span>';
    }

    // ספירת תווים
    updateCharCounter();

    // אקטיב כפתור שליחה
    document.getElementById('send-btn').disabled = (msg.length === 0 || recipients.length === 0);
  }

  // ─── ספירת תווים בעברית (UCS-2) ────────────────────
  function updateCharCounter() {
    const msg = document.getElementById('message').value;
    const len = msg.length;
    const segments = countSegments(msg);
    const counter = document.getElementById('char-counter');

    const limit = 70; // עברית = 70 תווים להודעה
    counter.textContent = `${len} תווים · ${segments} ${segments === 1 ? 'הודעה' : 'הודעות'}`;

    if (segments >= 3) counter.className = 'char-counter error';
    else if (segments === 2) counter.className = 'char-counter warning';
    else counter.className = 'char-counter';
  }

  function countSegments(msg) {
    if (!msg) return 0;
    // עברית = UCS-2 = 70 תווים. רב-הודעה = 67 תווים כל אחת.
    const len = msg.length;
    if (len <= 70) return 1;
    return Math.ceil(len / 67);
  }

  // ─── תבניות מוכנות ─────────────────────────────────
  const TEMPLATES = {
    weekly:  'מבצעי השבוע באופקים שלי! היכנסו לבדוק את הקופונים החמים: myofaqim.co.il/deals',
    event:   'אירוע חדש בעיר! פרטים מלאים באתר: myofaqim.co.il',
    reminder:'תזכורת מאופקים שלי - אל תפספסו את העדכונים שלנו. myofaqim.co.il',
    news:    'חדשות מהעיר אופקים! קראו את הכתבה החדשה: myofaqim.co.il',
  };
  function useTemplate(key) {
    document.getElementById('message').value = TEMPLATES[key] || '';
    updatePreview();
  }

  // ─── שליחת SMS בדיקה ──────────────────────────────
  async function testSms() {
    const msg = document.getElementById('message').value.trim();
    if (!msg) {
      showAlert('error', 'אנא הקלד הודעה לפני שליחת בדיקה');
      return;
    }
    const phone = prompt('הקלד מספר טלפון לבדיקה:', '0542338233');
    if (!phone) return;

    const token = await getAdminToken();
    if (!token) { showAlert('error', '❌ נדרשת התחברות כמנהל'); return; }

    showAlert('warning', 'שולח הודעת בדיקה...');

    try {
      const res = await fetch('/.netlify/functions/send-sms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ phone, message: msg }),
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        showAlert('success', `✅ ההודעה נשלחה ל-${phone}. בדוק את הטלפון!`);
      } else {
        showAlert('error', `❌ שגיאה: ${data.error || 'לא ידוע'}`);
      }
    } catch (e) {
      showAlert('error', `❌ שגיאה ברשת: ${e.message}`);
    }
  }

  // ─── שליחה מסיבית ─────────────────────────────────
  async function sendBroadcast() {
    const audience = document.getElementById('audience').value;
    const msg = document.getElementById('message').value.trim();

    let recipients = allSubs.filter(s => s.wants_sms);
    if (audience !== 'all') {
      recipients = recipients.filter(s => s.subscriber_type === audience);
    }

    if (!confirm(`האם אתה בטוח שברצונך לשלוח ל-${recipients.length} נמענים?\n\nעלות מוערכת: ${document.getElementById('estimated-cost').textContent}`)) {
      return;
    }

    const token = await getAdminToken();
    if (!token) { showAlert('error', '❌ נדרשת התחברות כמנהל'); return; }

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = 'שולח...';

    const results = document.getElementById('results');
    results.classList.add('show');
    results.innerHTML = '';

    let success = 0, failed = 0;

    for (const sub of recipients) {
      try {
        const res = await fetch('/.netlify/functions/send-sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ phone: sub.phone, message: msg }),
        });
        if (res.ok) {
          success++;
          addResult(sub.phone, true, 'נשלח');
        } else {
          const err = await res.json();
          failed++;
          addResult(sub.phone, false, err.error || 'נכשל');
        }
      } catch (e) {
        failed++;
        addResult(sub.phone, false, 'שגיאת רשת');
      }
      // המתנה קלה בין הודעות (rate limit)
      await new Promise(r => setTimeout(r, 100));
    }

    showAlert('success', `🎉 השליחה הסתיימה! ${success} הצליחו, ${failed} נכשלו.`);
    btn.disabled = false;
    btn.textContent = '🚀 שלח לכל הנמענים';
  }

  function addResult(phone, ok, msg) {
    const div = document.createElement('div');
    div.className = 'result-row ' + (ok ? 'success' : 'error');
    div.innerHTML = `
      <span class="phone">${phone}</span>
      <span class="status">${ok ? '✓ ' : '✗ '}${msg}</span>
    `;
    document.getElementById('results').appendChild(div);
  }

  function showAlert(type, msg) {
    const el = document.getElementById('alert');
    el.className = 'alert show ' + type;
    el.textContent = msg;
  }

  // ─── אירועים ──────────────────────────────────────
  document.getElementById('message').addEventListener('input', updatePreview);
  document.getElementById('audience').addEventListener('change', updatePreview);

  // ─── התחלה ────────────────────────────────────────
  (async function init() {
    const token = await getAdminToken();
    if (!token) {
      showAlert('error', 'דף זה מיועד למנהל האתר בלבד. יש להתחבר תחילה.');
      const btn = document.getElementById('send-btn');
      if (btn) btn.disabled = true;
      return;
    }
    loadStats();
  })();
</script>
</body>
</html>
