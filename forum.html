  if (!date) return '';
  const diff = (Date.now() - new Date(date).getTime()) / 1000;
  if (diff < 60) return 'עכשיו';
  if (diff < 3600) return `לפני ${Math.floor(diff/60)} דק׳`;
  if (diff < 86400) return `לפני ${Math.floor(diff/3600)} שעות`;
  if (diff < 604800) return `לפני ${Math.floor(diff/86400)} ימים`;
  return new Date(date).toLocaleDateString('he-IL');
}

const getInitial = (name) => (name || 'ת').trim().charAt(0).toUpperCase();

async function loadPosts() {
  try {
    // נסה תחילה עם is_active - אם נכשל ננסה בלי
    let { data, error } = await sb.from('forum_posts').select('*')
      .eq('is_active', true)
      .order('is_pinned', { ascending: false })
      .order('created_at', { ascending: false });

    // אם is_active לא קיים - תפול חזרה
    if (error && /is_active/i.test(error.message)) {
      const fallback = await sb.from('forum_posts').select('*')
        .order('created_at', { ascending: false });
      data = fallback.data;
      error = fallback.error;
    }

    if (error) throw error;
    allPosts = data || [];
    if (currentUser) await loadReadStatus();
    updateCounts();
    renderFeed();
    updateStats();
  } catch (e) {
    console.error('loadPosts error:', e);
    $('posts-feed').innerHTML = `<div class="empty-state"><h3>שגיאה בטעינה</h3><p>${esc(e.message)}</p><p style="margin-top:12px;font-size:12px;color:#94A3B8">אם הבעיה נמשכת, ייתכן שצריך להריץ את ה-SQL לעדכון טבלת הפורום.</p></div>`;
  }
}

async function loadReadStatus() {
  try {
    const { data } = await sb.from('forum_post_reads').select('post_id').eq('user_id', currentUser.id);
    readSet = new Set((data || []).map(r => r.post_id));
  } catch {}
}

function updateCounts() {
  $('cnt-all').textContent = allPosts.length;
  Object.keys(CAT_LABELS).forEach(k => {
    const el = $(`cnt-${k}`);
    if (el) el.textContent = allPosts.filter(p => p.category === k).length;
  });
}

function updateStats() {
  $('stat-posts').textContent = allPosts.length;
  const totalReplies = allPosts.reduce((s,p) => s + (p.replies_count || 0), 0);
  $('stat-replies').textContent = totalReplies;
  $('stat-online').textContent = Math.max(1, Math.floor(Math.random() * 8) + 2);
}

function renderFeed() {
  const items = currentCat === 'all' ? allPosts : allPosts.filter(p => p.category === currentCat);
  if (items.length === 0) {
    $('posts-feed').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <h3>אין פוסטים בקטגוריה זו</h3>
        <p>היה הראשון לפרסם!</p>
      </div>`;
    return;
  }
  $('posts-feed').innerHTML = items.map(renderPostCard).join('');
}

function renderPostCard(p) {
  const isUnread = currentUser && !readSet.has(p.id);
  const initial = getInitial(p.display_name);
  return `
    <article class="post-bubble ${p.is_pinned ? 'pinned' : ''} ${isUnread ? 'unread' : ''}" onclick="openPost('${p.id}')">
      ${p.is_pinned ? `<div class="pinned-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L19 7 L19 17 L13 17 L13 22 L11 22 L11 17 L5 17 L5 7 Z"/></svg> מוצמד</div>` : ''}
      <div class="post-user">
        <div class="post-avatar">${esc(initial)}</div>
        <div class="post-author-block">
          <div class="post-author-name">${esc(p.display_name || 'תושב/ת אופקים')}</div>
          <div class="post-meta-row">
            <span class="post-cat-tag ${p.category || ''}">${CAT_LABELS[p.category] || p.category}</span>
            <span>·</span>
            <span>${timeAgo(p.created_at)}</span>
          </div>
        </div>
      </div>
      <h2 class="post-title">${esc(p.title)}</h2>
      ${p.body ? `<p class="post-body-snippet">${esc(p.body)}</p>` : ''}
      <div class="post-footer-row">
        <span class="post-stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          ${p.replies_count || 0}
        </span>
        <span class="post-stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          ${p.likes_count || 0}
        </span>
        ${currentUser ? `<span class="read-receipt ${readSet.has(p.id) ? 'read' : ''}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 7 9.5 15.5 6 12"/><polyline points="22 7 13.5 15.5 12 14"/></svg>
        </span>` : ''}
      </div>
    </article>`;
}

async function openPost(id) {
  currentPostId = id;
  $('list-view').style.display = 'none';
  $('detail-view').classList.add('active');
  $('detail-content').innerHTML = '<div class="loader">טוען...</div>';
  $('detail-actions').innerHTML = '';

  try {
    const [postRes, repliesRes, reactionsRes, readsRes] = await Promise.all([
      sb.from('forum_posts').select('*').eq('id', id).single(),
      sb.from('forum_replies').select('*').eq('post_id', id).order('created_at'),
      sb.from('forum_reactions').select('*').eq('post_id', id),
      sb.from('forum_post_reads').select('user_id').eq('post_id', id)
    ]);
    if (postRes.error) throw postRes.error;
    const p = postRes.data;
    const replies = repliesRes.data || [];
    const reactions = reactionsRes.data || [];
    const reads = readsRes.data || [];

    if (currentUser && !readSet.has(id)) {
      sb.from('forum_post_reads').insert({ post_id: id, user_id: currentUser.id }).then(() => readSet.add(id)).catch(() => {});
    }

    $('detail-topbar-title').textContent = p.title;
    $('detail-topbar-meta').textContent = `${p.display_name || 'תושב/ת'} · ${timeAgo(p.created_at)} · ${reads.length} צפיות`;

    const isPostOwner = currentUser && (currentUser.id === p.author_id || isAdmin);
    if (isPostOwner) {
      $('detail-actions').innerHTML = `
        <button class="topbar-action-btn" onclick="editPost('${p.id}')" title="ערוך"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="topbar-action-btn danger" onclick="deletePost('${p.id}')" title="מחק"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg></button>`;
    }

    const reactionCounts = {};
    const userReactions = new Set();
    REACTIONS.forEach(r => reactionCounts[r.type] = 0);
    reactions.forEach(r => {
      reactionCounts[r.reaction_type] = (reactionCounts[r.reaction_type] || 0) + 1;
      if (currentUser && r.user_id === currentUser.id) userReactions.add(r.reaction_type);
    });

    const initial = getInitial(p.display_name);
    const readByOthers = reads.filter(r => r.user_id !== currentUser?.id).length;

    $('detail-content').innerHTML = `
      <div class="post-full">
        <div class="post-user">
          <div class="post-avatar">${esc(initial)}</div>
          <div class="post-author-block">
            <div class="post-author-name">${esc(p.display_name || 'תושב/ת אופקים')}</div>
            <div class="post-meta-row">
              <span class="post-cat-tag ${p.category}">${CAT_LABELS[p.category] || p.category}</span>
              <span>·</span>
              <span>${timeAgo(p.created_at)}</span>
              ${reads.length > 0 ? `<span>·</span><span>${reads.length} צפיות</span>` : ''}
            </div>
          </div>
        </div>
        <h1 id="post-title-${p.id}">${esc(p.title)}</h1>
        <div class="post-full-body" id="post-body-${p.id}" data-original="${esc(p.body || '')}">${esc(p.body || '')}</div>
        <div class="reactions-bar">
          ${REACTIONS.map(r => `
            <button class="reaction-btn ${userReactions.has(r.type) ? 'active' : ''}" onclick="toggleReaction('${p.id}', null, '${r.type}')">
              <span>${r.icon}</span>
              ${reactionCounts[r.type] > 0 ? `<span class="count">${reactionCounts[r.type]}</span>` : ''}
            </button>
          `).join('')}
        </div>
      </div>

      <div class="replies-section">
        <div class="replies-title">${replies.length} תגובות</div>
        ${replies.map(r => renderReply(r, p.id)).join('')}

        ${currentUser ? `
          <div class="reply-composer">
            <textarea id="reply-text" placeholder="כתבו תגובה..."></textarea>
            <div class="composer-row">
              <button class="btn-send" onclick="submitReply('${p.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                שלח
              </button>
            </div>
          </div>
        ` : `
          <div class="login-prompt">
            <p>כדי להגיב, אנא התחבר תחילה</p>
            <button onclick="if(typeof mofOpenAuth==='function')mofOpenAuth()">התחברות / הרשמה</button>
          </div>`}
      </div>`;

    window.scrollTo(0, 0);
  } catch(e) {
    $('detail-content').innerHTML = `<div class="empty-state"><h3>שגיאה</h3><p>${esc(e.message)}</p></div>`;
  }
}

function renderReply(r, postId) {
  const isReplyOwner = currentUser && (currentUser.id === r.author_id || isAdmin);
  const initial = getInitial(r.display_name);
  return `
    <div class="reply-bubble" id="reply-${r.id}">
      <div class="reply-user-row">
        <div class="reply-avatar">${esc(initial)}</div>
        <span class="reply-author">${esc(r.display_name || 'תושב/ת')}</span>
        <span class="reply-time">${timeAgo(r.created_at)}</span>
      </div>
      <div class="reply-body" id="reply-body-${r.id}" data-original="${esc(r.body)}">${esc(r.body)}</div>
      ${isReplyOwner ? `
        <div class="reply-actions">
          <button class="reply-action-btn" onclick="editReply('${r.id}','${postId}')">ערוך</button>
          <button class="reply-action-btn danger" onclick="deleteReply('${r.id}','${postId}')">מחק</button>
        </div>
      ` : ''}
    </div>`;
}

function showList() {
  $('list-view').style.display = '';
  $('detail-view').classList.remove('active');
  currentPostId = null;
  loadPosts();
}

async function toggleReaction(postId, replyId, type) {
  if (!currentUser) { if (typeof mofOpenAuth === 'function') mofOpenAuth(); return; }
  try {
    const filter = postId ? { post_id: postId, reply_id: null } : { reply_id: replyId, post_id: null };
    const { data: existing } = await sb.from('forum_reactions').select('id')
      .match({ ...filter, user_id: currentUser.id, reaction_type: type });

    if (existing && existing.length > 0) {
      await sb.from('forum_reactions').delete().eq('id', existing[0].id);
    } else {
      await sb.from('forum_reactions').insert({ ...filter, user_id: currentUser.id, reaction_type: type });
    }
    if (currentPostId) openPost(currentPostId);
  } catch(e) { alert('שגיאה: ' + e.message); }
}

function tryNewPost() {
  if (!currentUser) { if (typeof mofOpenAuth === 'function') mofOpenAuth(); return; }
  $('new-post-modal').classList.add('active');
}

function closeNewPost() {
  $('new-post-modal').classList.remove('active');
  $('np-title').value = ''; $('np-body').value = '';
}

async function submitNewPost() {
  const cat = $('np-category').value;
  const title = $('np-title').value.trim();
  const body = $('np-body').value.trim();
  if (!title) { alert('נא להזין כותרת'); return; }

  const meta = currentUser.user_metadata || {};
  const displayName = meta.full_name || meta.name || 'תושב/ת אופקים';

  try {
    const { error } = await sb.from('forum_posts').insert({
      author_id: currentUser.id, display_name: displayName,
      category: cat, title, body, is_active: true, likes_count: 0, replies_count: 0
    });
    if (error) throw error;
    closeNewPost();
    loadPosts();
  } catch(e) { alert('שגיאה: ' + e.message); }
}

async function submitReply(postId) {
  if (!currentUser) { if (typeof mofOpenAuth === 'function') mofOpenAuth(); return; }
  const text = $('reply-text')?.value?.trim();
  if (!text) return;
  const meta = currentUser.user_metadata || {};
  const name = meta.full_name || meta.name || 'תושב/ת אופקים';
  try {
    const { error } = await sb.from('forum_replies').insert({
      post_id: postId, author_id: currentUser.id, display_name: name, body: text
    });
    if (error) throw error;
    openPost(postId);
  } catch(e) { alert('שגיאה: ' + e.message); }
}

async function deletePost(postId) {
  if (!confirm('למחוק את הפוסט?')) return;
  try {
    const { error } = await sb.from('forum_posts').delete().eq('id', postId);
    if (error) throw error;
    showList();
  } catch(e) { alert('שגיאה: ' + e.message); }
}

function editPost(postId) {
  const titleEl = $(`post-title-${postId}`);
  const bodyEl = $(`post-body-${postId}`);
  const t = titleEl.textContent;
  const b = bodyEl.dataset.original || bodyEl.textContent;
  titleEl.innerHTML = `<input class="edit-input" id="et-${postId}" value="${esc(t)}">`;
  bodyEl.innerHTML = `
    <textarea class="edit-input" id="eb-${postId}" style="min-height:120px">${esc(b)}</textarea>
    <div class="edit-actions">
      <button class="save" onclick="savePostEdit('${postId}')">שמור</button>
      <button class="cancel" onclick="openPost('${postId}')">בטל</button>
    </div>`;
}

async function savePostEdit(postId) {
  const t = $(`et-${postId}`).value.trim();
  const b = $(`eb-${postId}`).value.trim();
  if (!t) { alert('כותרת חסרה'); return; }
  try {
    const { error } = await sb.from('forum_posts').update({
      title: t, body: b, updated_at: new Date().toISOString()
    }).eq('id', postId);
    if (error) throw error;
    openPost(postId);
  } catch(e) { alert('שגיאה: ' + e.message); }
}

async function deleteReply(replyId, postId) {
  if (!confirm('למחוק את התגובה?')) return;
  try {
    const { error } = await sb.from('forum_replies').delete().eq('id', replyId);
    if (error) throw error;
    openPost(postId);
  } catch(e) { alert('שגיאה: ' + e.message); }
}

function editReply(replyId, postId) {
  const bodyEl = $(`reply-body-${replyId}`);
  const original = bodyEl.dataset.original || bodyEl.textContent;
  bodyEl.innerHTML = `
    <textarea class="edit-input" id="er-${replyId}" style="min-height:60px">${esc(original)}</textarea>
    <div class="edit-actions">
      <button class="save" onclick="saveReplyEdit('${replyId}','${postId}')">שמור</button>
      <button class="cancel" onclick="openPost('${postId}')">בטל</button>
    </div>`;
}

async function saveReplyEdit(replyId, postId) {
  const newBody = $(`er-${replyId}`).value.trim();
  if (!newBody) { alert('ריק'); return; }
  try {
    const { error } = await sb.from('forum_replies').update({ body: newBody }).eq('id', replyId);
    if (error) throw error;
    openPost(postId);
  } catch(e) { alert('שגיאה: ' + e.message); }
}

document.querySelectorAll('.cat-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentCat = chip.dataset.cat;
    renderFeed();
  });
});

async function forumInit() {
  if (!window.supabase) {
    if (!window._forum_attempts) window._forum_attempts = 0;
    window._forum_attempts++;
    if (window._forum_attempts > 40) {
      $('posts-feed').innerHTML = `<div class="empty-state"><h3>שגיאה</h3><p>לא ניתן לטעון את המערכת. אנא רענן את הדף.</p></div>`;
      return;
    }
    setTimeout(forumInit, 200);
    return;
  }
  try {
    sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      isAdmin = ADMIN_EMAILS.includes((currentUser.email || '').toLowerCase());
    }
    sb.auth.onAuthStateChange((event, session) => {
      currentUser = session?.user || null;
      isAdmin = currentUser ? ADMIN_EMAILS.includes((currentUser.email || '').toLowerCase()) : false;
      loadPosts();
    });
    loadPosts();
  } catch (e) {
    console.error('Forum init error:', e);
    $('posts-feed').innerHTML = `<div class="empty-state"><h3>שגיאה</h3><p>${esc(e.message)}</p></div>`;
  }
}

window.openPost = openPost;
window.showList = showList;
window.tryNewPost = tryNewPost;
window.closeNewPost = closeNewPost;
window.submitNewPost = submitNewPost;
window.submitReply = submitReply;
window.toggleReaction = toggleReaction;
window.deletePost = deletePost;
window.editPost = editPost;
window.savePostEdit = savePostEdit;
window.deleteReply = deleteReply;
window.editReply = editReply;
window.saveReplyEdit = saveReplyEdit;

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    if (window.supabase) forumInit();
    else window.addEventListener('load', forumInit, { once: true });
  });
} else {
  forumInit();
}
</script>
</body>
</html>
