// ── מיקום משתמש (best-effort, לא חוסם) ──
let cachedCoords = null, coordsDenied = false;
function requestCoords(timeout = 6000) {
  return new Promise(resolve => {
    if (cachedCoords) return resolve(cachedCoords);
    if (coordsDenied || !navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      pos => { cachedCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude }; resolve(cachedCoords); },
      () => { coordsDenied = true; resolve(null); },
      { enableHighAccuracy: false, timeout, maximumAge: 300000 }
    );
  });
}

      </div>
      <h3>${msg || 'מחפש...'}</h3>
      <p>הבינה המלאכותית מנתחת את השאלה וסורקת את האתר</p>
    </div>
    <style>@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }</style>`;
}

// קריאה למנוע ה-AI בצד השרת (Netlify Function)
async function callAI(query, coords) {
  const res = await fetch('/.netlify/functions/ai-search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ q: query, lat: coords ? coords.lat : undefined, lng: coords ? coords.lng : undefined })
  });
  const data = await res.json().catch(() => null);
  if (!res.ok || !data || !data.ok) throw new Error((data && data.error) || ('ai-search ' + res.status));
  return data;
}

async function performSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  // עדכון URL
  const url = new URL(window.location);
  url.searchParams.set('q', query);
  window.history.replaceState({}, '', url);

  showLoading();

  try {
    let data = await callAI(query, cachedCoords);

    // אם השאלה דורשת "קרוב" וטרם שותף מיקום — בקש פעם אחת והרץ שוב
    if (data.wants_nearby && !data.has_geo && navigator.geolocation && !coordsDenied) {
      const c = await requestCoords();
      if (c) { try { data = await callAI(query, c); } catch (_) { /* שומרים על התוצאה הראשונה */ } }
    }

    lastData = {
      answer: data.answer || '',
      results: data.results || {},
      total: data.total || 0,
      ai: !!data.ai,
      has_geo: !!data.has_geo,
      wants_nearby: !!data.wants_nearby,
    };
    renderResults();
  } catch (e) {
    // נפילה חיננית: אם פונקציית ה-AI לא זמינה — חיפוש מילולי רגיל
    await keywordSearch(query);
  }
}

// ── חיפוש מילולי (גיבוי, ללא AI) — מנרמל לאותו מבנה תצוגה ──
async function keywordSearch(query) {
  if (!sb) { showLoading('טוען...'); setTimeout(() => keywordSearch(query), 300); return; }
  const q = query.toLowerCase();
  const L = `%${query}%`;
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

  const [biz, pro, coup, syn, mik, lesson, svc] = await Promise.allSettled([
    sb.from('businesses').select('id,name,business_name,short_description,description,category,city,status,is_active').or(`name.ilike.${L},business_name.ilike.${L},short_description.ilike.${L},description.ilike.${L},category.ilike.${L}`).limit(20),
    sb.from('professionals').select('id,name,category,tagline,description,status').or(`name.ilike.${L},category.ilike.${L},tagline.ilike.${L},description.ilike.${L}`).limit(20),
    sb.from('coupons').select('id,title,description,status,expires_at').or(`title.ilike.${L},description.ilike.${L}`).limit(20),
    sb.from('synagogues').select('id,name,address,nusach').or(`name.ilike.${L},address.ilike.${L}`).limit(20),
    sb.from('mikvehs').select('id,name,address,type,phone').or(`name.ilike.${L},address.ilike.${L}`).limit(20),
    sb.from('torah_lessons').select('id,title,topic,rabbi_name,location,day_of_week').or(`title.ilike.${L},topic.ilike.${L},rabbi_name.ilike.${L}`).limit(20),
    sb.from('public_services').select('id,name,subname,address,phone').or(`name.ilike.${L},subname.ilike.${L},address.ilike.${L}`).limit(20)
  ]);

  const data = r => (r.status === 'fulfilled' && r.value && r.value.data) ? r.value.data : [];
  const results = { business: [], professional: [], coupon: [], synagogue: [], mikveh: [], lesson: [], service: [], event: [], article: [] };

  results.business = data(biz)
    .filter(b => b.is_active !== false && b.status !== 'rejected' && b.status !== 'pending')
    .map(b => ({ type: 'business', id: b.id, title: b.name || b.business_name || 'עסק', subtitle: b.short_description || b.description || b.category || 'עסק באופקים', footer: b.city || 'אופקים', url: `/business?id=${b.id}` }));
  results.professional = data(pro)
    .filter(p => p.status !== 'rejected' && p.status !== 'pending')
    .map(p => ({ type: 'professional', id: p.id, title: p.name || 'בעל מקצוע', subtitle: [p.category, p.tagline].filter(Boolean).join(' · ') || 'בעל מקצוע באופקים', footer: 'אופקים', url: '/professionals' }));
  results.coupon = data(coup)
    .filter(c => !c.expires_at || new Date(c.expires_at) > new Date())
    .map(c => ({ type: 'coupon', id: c.id, title: c.title || 'הטבה', subtitle: c.description || 'הטבה לתושבי אופקים', footer: c.expires_at ? 'תוקף: ' + new Date(c.expires_at).toLocaleDateString('he-IL') : 'פעיל', url: '/deals' }));
  results.synagogue = data(syn)
    .map(s => ({ type: 'synagogue', id: s.id, title: s.name || 'בית כנסת', subtitle: [s.address, s.nusach ? 'נוסח ' + s.nusach : ''].filter(Boolean).join(' · ') || 'בית כנסת באופקים', footer: 'פרטים מלאים', url: '/synagogues' }));
  results.mikveh = data(mik)
    .map(m => ({ type: 'mikveh', id: m.id, title: m.name || 'מקווה', subtitle: [m.type, m.address].filter(Boolean).join(' · ') || 'מקווה באופקים', footer: m.phone || 'פרטים', url: '/mikvaot' }));
  results.lesson = data(lesson)
    .map(l => ({ type: 'lesson', id: l.id, title: l.title || l.topic || 'שיעור תורה', subtitle: [l.rabbi_name, l.location, (l.day_of_week != null ? 'יום ' + days[l.day_of_week] : '')].filter(Boolean).join(' · ') || 'שיעור תורה', footer: 'שיעור תורה', url: '/torah-lessons' }));
  results.service = data(svc)
    .map(s => ({ type: 'service', id: s.id, title: s.name || 'שירות', subtitle: [s.subname, s.address].filter(Boolean).join(' · ') || 'שירות ציבורי', footer: s.phone || '', url: '/public-services' }));
  results.article = STATIC_ARTICLES
    .filter(a => a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q) || a.keywords.toLowerCase().includes(q))
    .map(a => ({ type: 'article', id: a.id, title: a.title, subtitle: a.desc, footer: 'מאמר באתר', url: a.url }));

  const total = Object.values(results).reduce((s, a) => s + a.length, 0);
  lastData = { answer: total ? `נמצאו ${total} תוצאות עבור "${query}".` : '', results, total, ai: false, has_geo: false, wants_nearby: false };
  renderResults();
}

function renderResults() {
  if (!lastData) return;
  const { results, total, answer } = lastData;

  // עדכון counts
  document.getElementById('count-all').textContent = total;
  Object.keys(results).forEach(k => {
    const el = document.getElementById('count-' + k);
    if (el) el.textContent = results[k].length;
  });

  // הצג סרגל סינון
  document.getElementById('filter-bar').style.display = '';

  if (total === 0) {
    document.getElementById('results-area').innerHTML = `
      ${answer ? aiAnswerBox(answer) : ''}
      <div class="search-state">
        <div class="search-state-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </div>
        <h3>לא נמצאו תוצאות</h3>
        <p>נסו לנסח אחרת או לבחור מההצעות</p>
        <div class="suggestions">
          <div class="suggestion-chips" style="justify-content:center">
            <button class="suggestion-chip" onclick="searchFor('פיצה')">פיצה</button>
            <button class="suggestion-chip" onclick="searchFor('בית כנסת קרוב')">בית כנסת קרוב</button>
            <button class="suggestion-chip" onclick="searchFor('חשמלאי')">חשמלאי</button>
            <button class="suggestion-chip" onclick="searchFor('קופת חולים')">קופת חולים</button>
          </div>
        </div>
      </div>`;
    return;
  }

  // ארגן לפי קבוצות
  const html = Object.entries(results)
    .filter(([, items]) => items.length > 0)
    .filter(([cat]) => currentFilter === 'all' || currentFilter === cat)
    .map(([cat, items]) => `
      <div class="result-group" data-cat="${cat}">
        <div class="result-group-header">
          <div class="result-group-icon">${ICONS[cat] || ''}</div>
          <div class="result-group-title">${GROUP_TITLES[cat] || cat}</div>
          <div class="result-group-count">${items.length} ${items.length === 1 ? 'תוצאה' : 'תוצאות'}</div>
        </div>
        <div class="result-grid">
          ${items.map(item => renderCard(cat, item)).join('')}
        </div>
      </div>
    `).join('');

  const showAnswer = (currentFilter === 'all' && answer) ? aiAnswerBox(answer) : '';
  document.getElementById('results-area').innerHTML = showAnswer + (html || `
    <div class="search-state">
      <h3>אין תוצאות בקטגוריה זו</h3>
      <p>נסו לבחור קטגוריה אחרת</p>
    </div>`);
}

// תיבת תשובת ה-AI (כמו "סקירת AI" בגוגל)
function aiAnswerBox(answer) {
  return `<div style="display:flex;gap:12px;align-items:flex-start;background:linear-gradient(135deg,rgba(99,102,241,.10),rgba(168,85,247,.08));border:1px solid rgba(99,102,241,.25);border-radius:14px;padding:16px 18px;margin:0 0 22px;">
    <div style="flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.8L20 8l-4.9 3.6 1.9 5.8L12 13.8 7 17.4l1.9-5.8L4 8l6.1-.2z"/></svg>
    </div>
    <div style="font-size:14.5px;line-height:1.65;color:var(--ink);align-self:center;">${esc(answer)}</div>
  </div>`;
}

function renderCard(type, item) {
  const arrow = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;
  const dist = (item.distance_km != null)
    ? ` <span style="color:#6366f1;font-weight:600;">· ~${item.distance_km} ק"מ ממך</span>` : '';
  return `<a href="${item.url || '#'}" class="result-card ${type}">
    <span class="label">${LABELS[type] || ''}</span>
    <h3>${esc(item.title || '')}</h3>
    <div class="meta">${esc(item.subtitle || '')}</div>
    <div class="footer"><span>${esc(item.footer || '')}${dist}</span><span class="arrow">צפה ${arrow}</span></div>
  </a>`;
}

// סינון
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderResults();
  });
});

// Enter בשדה החיפוש
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') performSearch();
});

// אם יש שאילתה ב-URL - בצע חיפוש אוטומטית
function initSearchFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('search-input').value = q;
    performSearch();
  } else {
    document.getElementById('search-input').focus();
  }
}

// init אחרי שsupabase-js נטען
function searchInit() {
  if (!window.supabase) {
    setTimeout(searchInit, 200);
    return;
  }
  sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);
  initSearchFromUrl();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', searchInit);
} else {
  searchInit();
}

window.performSearch = performSearch;
window.searchFor = searchFor;
</script>
</body>
</html>
