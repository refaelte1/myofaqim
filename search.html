const STATIC_ARTICLES = [

// פונקציית esc מ-site.js (window.esc)
function searchFor(q) {
  document.getElementById('search-input').value = q;
  performSearch();

async function performSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  // עדכון URL
  const url = new URL(window.location);
  url.searchParams.set('q', query);
  window.history.replaceState({}, '', url);

  // הצג טעינה
  document.getElementById('results-area').innerHTML = `
    <div class="search-state">
      <div class="search-state-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
      </div>
      <h3>מחפש...</h3>
      <p>בודקים בכל המאגרים</p>
    </div>
    <style>@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }</style>
  `;

  // אפס תוצאות
  allResults = { business: [], professional: [], coupon: [], synagogue: [], lesson: [], service: [], article: [] };

  const q = query.toLowerCase();

  // חיפוש במקביל בכל המקורות
  const [biz, pro, coup, syn, lesson, svc] = await Promise.allSettled([
    sb.from('businesses').select('id,name,short_description,description,category_slug,city,status').or(`name.ilike.%${query}%,short_description.ilike.%${query}%,description.ilike.%${query}%`).limit(20),
    sb.from('professionals').select('id,full_name,profession,bio,city,status').or(`full_name.ilike.%${query}%,profession.ilike.%${query}%,bio.ilike.%${query}%`).limit(20),
    sb.from('coupons').select('id,title,description,business_id,status,expires_at').or(`title.ilike.%${query}%,description.ilike.%${query}%`).limit(20),
    sb.from('synagogues').select('id,name,address,nusach').or(`name.ilike.%${query}%,address.ilike.%${query}%`).limit(20),
    sb.from('torah_lessons').select('id,topic,teacher,location_name,day_of_week').or(`topic.ilike.%${query}%,teacher.ilike.%${query}%`).limit(20),
    sb.from('public_services').select('id,name,subname,category,address,phone').or(`name.ilike.%${query}%,subname.ilike.%${query}%,address.ilike.%${query}%`).limit(20)
  ]);

  // עיבוד תוצאות
  if (biz.status === 'fulfilled' && biz.value.data) {
    allResults.business = biz.value.data.filter(b => b.status !== 'rejected' && b.status !== 'pending');
  }
  if (pro.status === 'fulfilled' && pro.value.data) {
    allResults.professional = pro.value.data.filter(p => p.status !== 'rejected' && p.status !== 'pending');
  }
  if (coup.status === 'fulfilled' && coup.value.data) {
    allResults.coupon = coup.value.data.filter(c => !c.expires_at || new Date(c.expires_at) > new Date());
  }
  if (syn.status === 'fulfilled' && syn.value.data) allResults.synagogue = syn.value.data;
  if (lesson.status === 'fulfilled' && lesson.value.data) allResults.lesson = lesson.value.data;
  if (svc.status === 'fulfilled' && svc.value.data) allResults.service = svc.value.data;

  // מאמרים סטטיים
  allResults.article = STATIC_ARTICLES.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.desc.toLowerCase().includes(q) ||
    a.keywords.toLowerCase().includes(q)
  );

  renderResults();
}

function renderResults() {
  const total = Object.values(allResults).reduce((sum, arr) => sum + arr.length, 0);

  // עדכון counts
  document.getElementById('count-all').textContent = total;
  Object.keys(allResults).forEach(k => {
    const el = document.getElementById('count-' + k);
    if (el) el.textContent = allResults[k].length;
  });

  // הצג סרגל סינון
  document.getElementById('filter-bar').style.display = '';

  if (total === 0) {
    document.getElementById('results-area').innerHTML = `
      <div class="search-state">
        <div class="search-state-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </div>
        <h3>לא נמצאו תוצאות</h3>
        <p>נסו לחפש מילה אחרת או חיפושים פופולריים</p>
        <div class="suggestions">
          <div class="suggestion-chips" style="justify-content:center">
            <button class="suggestion-chip" onclick="searchFor('פיצה')">פיצה</button>
            <button class="suggestion-chip" onclick="searchFor('חשמלאי')">חשמלאי</button>
            <button class="suggestion-chip" onclick="searchFor('סופרמרקט')">סופרמרקט</button>
            <button class="suggestion-chip" onclick="searchFor('קופון')">קופון</button>
          </div>
        </div>
      </div>`;
    return;
  }

  // ארגן לפי קבוצות
  const html = Object.entries(allResults)
    .filter(([cat, items]) => items.length > 0)
    .filter(([cat]) => currentFilter === 'all' || currentFilter === cat)
    .map(([cat, items]) => `
      <div class="result-group" data-cat="${cat}">
        <div class="result-group-header">
          <div class="result-group-icon">${ICONS[cat]}</div>
          <div class="result-group-title">${GROUP_TITLES[cat]}</div>
          <div class="result-group-count">${items.length} ${items.length === 1 ? 'תוצאה' : 'תוצאות'}</div>
        </div>
        <div class="result-grid">
          ${items.map(item => renderCard(cat, item)).join('')}
        </div>
      </div>
    `).join('');

  document.getElementById('results-area').innerHTML = html || `
    <div class="search-state">
      <h3>אין תוצאות בקטגוריה זו</h3>
      <p>נסו לבחור קטגוריה אחרת</p>
    </div>`;
}

function renderCard(type, item) {
  const arrow = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;

  if (type === 'business') {
    return `<a href="/business?id=${item.id}" class="result-card business">
      <span class="label">${LABELS.business}</span>
      <h3>${esc(item.name)}</h3>
      <div class="meta">${esc(item.short_description || item.description || 'עסק באופקים')}</div>
      <div class="footer"><span>${esc(item.city || 'אופקים')}</span><span class="arrow">צפה ${arrow}</span></div>
    </a>`;
  }
  if (type === 'professional') {
    return `<a href="/professionals" class="result-card professional">
      <span class="label">${LABELS.professional}</span>
      <h3>${esc(item.full_name)}</h3>
      <div class="meta">${esc(item.profession || '')}${item.bio ? ' · ' + esc(item.bio.slice(0,80)) : ''}</div>
      <div class="footer"><span>${esc(item.city || 'אופקים')}</span><span class="arrow">צפה ${arrow}</span></div>
    </a>`;
  }
  if (type === 'coupon') {
    return `<a href="/deals" class="result-card coupon">
      <span class="label">${LABELS.coupon}</span>
      <h3>${esc(item.title)}</h3>
      <div class="meta">${esc(item.description || 'הטבה לתושבי אופקים')}</div>
      <div class="footer"><span>${item.expires_at ? 'תוקף: ' + new Date(item.expires_at).toLocaleDateString('he-IL') : 'פעיל'}</span><span class="arrow">צפה ${arrow}</span></div>
    </a>`;
  }
  if (type === 'synagogue') {
    return `<a href="/synagogues" class="result-card synagogue">
      <span class="label">${LABELS.synagogue}</span>
      <h3>${esc(item.name)}</h3>
      <div class="meta">${esc(item.address || '')}${item.nusach ? ' · נוסח ' + esc(item.nusach) : ''}</div>
      <div class="footer"><span>פרטים מלאים</span><span class="arrow">צפה ${arrow}</span></div>
    </a>`;
  }
  if (type === 'lesson') {
    const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    return `<a href="/prayer-times#lessons" class="result-card lesson">
      <span class="label">${LABELS.lesson}</span>
      <h3>${esc(item.topic)}</h3>
      <div class="meta">${esc(item.teacher || '')}${item.location_name ? ' · ' + esc(item.location_name) : ''}${item.day_of_week !== undefined ? ' · יום ' + days[item.day_of_week] : ''}</div>
      <div class="footer"><span>שיעור תורה</span><span class="arrow">צפה ${arrow}</span></div>
    </a>`;
  }
  if (type === 'service') {
    return `<a href="/public-services" class="result-card service">
      <span class="label">${LABELS.service}</span>
      <h3>${esc(item.name)}</h3>
      <div class="meta">${esc(item.subname || '')}${item.address ? ' · ' + esc(item.address) : ''}</div>
      <div class="footer"><span>${esc(item.phone || '')}</span><span class="arrow">פרטים ${arrow}</span></div>
    </a>`;
  }
  if (type === 'article') {
    return `<a href="${item.url}" class="result-card article">
      <span class="label">${LABELS.article}</span>
      <h3>${esc(item.title)}</h3>
      <div class="meta">${esc(item.desc)}</div>
      <div class="footer"><span>מאמר באתר</span><span class="arrow">קרא ${arrow}</span></div>
    </a>`;
  }
  return '';
}

// סינון
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderResults();
  });
});

// Enter בשדה החיפוש
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') performSearch();
});

// אם יש שאילתה ב-URL - בצע חיפוש אוטומטית
function initSearchFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('search-input').value = q;
    performSearch();
  } else {
    document.getElementById('search-input').focus();
  }
}

// init אחרי שsupabase-js נטען
function searchInit() {
  if (!window.supabase) {
    setTimeout(searchInit, 200);
    return;
  }
  sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);
  initSearchFromUrl();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', searchInit);
} else {
  searchInit();
}

window.performSearch = performSearch;
window.searchFor = searchFor;
</script>
</body>
</html>
