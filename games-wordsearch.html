<style>
  body { background: linear-gradient(180deg, #0F1E3D 0%, #1A2E5C 100%); min-height: 100vh; color: #fff; touch-action: manipulation; }

  .ws-wrap { max-width: 720px; margin: 24px auto; padding: 0 12px; }

  /* ── Back Link ── */

  .word-grid {
    display: grid; gap: 2px;

  .cell {
    aspect-ratio: 1;

    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: clamp(13px, 3.5vw, 18px);

    cursor: pointer;

  .cell:hover { background: #EFF6FF; }
  .cell.selected {

  .cell.found {

  }
  .cell.found.selected { background: linear-gradient(135deg, #16A34A 0%, #15803D 100%); }

  /* ── Words List ── */
  .words-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 16px 20px;
    margin-bottom: 14px;
  }
  .words-head {
    display: flex; align-items: center; justify-content: space-between;

  }
  .words-head h3 {

  .words-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .word-chip {

<script>
'use strict';

// window.SB_URL מ-site.js (window.SB_URL)
// window.SB_KEY מ-site.js (window.SB_KEY)
const HEBREW_LETTERS = 'אבגדהוזחטיכלמנסעפצקרשת';

// ───── מאגר המילים ─────
// כולן בעברית, ללא רווחים. מינימום 4 אותיות, מקסימום 8.
const WORD_POOL = [
  { word: 'אופקים', hint: 'העיר שלנו' },
  { word: 'הפארק', hint: 'מקום ירוק לבילוי' },
  { word: 'חורשה', hint: 'אזור עצים' },
  { word: 'יביא', hint: 'מוסד חינוך תורני' },
  { word: 'מתנס', hint: 'מרכז קהילתי' },
  { word: 'היכל', hint: 'מקום אירועים גדול' },
  { word: 'עירייה', hint: 'מרכז המינהל המוניציפלי' },
  { word: 'רובע', hint: 'אזור מגורים' },
  { word: 'הגפן', hint: 'מישור באופקים' },
  { word: 'השקד', hint: 'רמת ה...' },
  { word: 'הנגב', hint: 'האזור הגאוגרפי' },
  { word: 'הרצל', hint: 'הרחוב המרכזי' },
  { word: 'דרום', hint: 'הכיוון שלנו' },
  { word: 'מקווה', hint: 'מקום טהרה' },
  { word: 'מספרה', hint: 'עסק לתספורת' },
  { word: 'אטליז', hint: 'חנות בשר' },
  { word: 'מכולת', hint: 'חנות מצרכים' },
  { word: 'גמחים', hint: 'גמלה - גמיל - גמ"ח' },
  { word: 'תושב', hint: 'מי שגר כאן' },
  { word: 'כנסת', hint: 'בית ה...' },
  { word: 'הרבי', hint: 'מנהיג רוחני' },
  { word: 'מנחה', hint: 'תפילה אחה"צ' },
  { word: 'שחרית', hint: 'תפילת הבוקר' },
  { word: 'מאפיה', hint: 'מקום ללחם טרי' },
  { word: 'בריאות', hint: 'קופת ...' },
  { word: 'מועצה', hint: 'דתית של העיר' },
  { word: 'גנים', hint: 'מקום למשחק ילדים' },
  { word: 'מטעם', hint: 'רשת מסעדות' },
  { word: 'מבצע', hint: 'הצעת קופון' },
  { word: 'מסעדה', hint: 'מקום לאכול בו' }
];

let GRID_SIZE = 12;
let grid = [];
let placedWords = [];     // [{word, start: [r,c], end: [r,c], direction, found}]
let isSelecting = false;
let selectionPath = [];
let timer = 0;
let timerInterval = null;
let foundCount = 0;
let hintsLeft = 3;
let hintsUsed = 0;
let sb = null;
let currentUser = null;

// פונקציית $ מ-site.js (window.$)
// פונקציית esc מ-site.js (window.esc)
function toast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function pad(n) { return String(n).padStart(2, '0'); }
function fmtTime(s) {
  return pad(Math.floor(s / 60)) + ':' + pad(s % 60);
}

function shuffle(a) {
  const r = a.slice();
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

function randInt(n) { return Math.floor(Math.random() * n); }

// ───── יצירת הלוח ─────
function createGrid() {
  // התחל עם מטריצה ריקה
  grid = Array.from({ length: GRID_SIZE }, () =>
    Array.from({ length: GRID_SIZE }, () => null)
  );
  placedWords = [];

  // בחר 10 מילים אקראיות
  const selected = shuffle(WORD_POOL).slice(0, 10);

  // נסה לשבץ כל מילה
  const directions = [
    [0, 1],   // ימין->שמאל (בעברית RTL)
    [1, 0],   // מטה
    [1, 1],   // מטה-שמאלה
    [1, -1],  // מטה-ימינה
    [-1, 1],  // עולה-שמאלה
  ];

  for (const item of selected) {
    const placed = tryPlace(item.word, directions);
    if (placed) {
      placedWords.push({
        word: item.word,
        hint: item.hint,
        ...placed,
        found: false
      });
    }
  }

  // מלא את שאר התאים באותיות אקראיות
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c] === null) {
        grid[r][c] = HEBREW_LETTERS[randInt(HEBREW_LETTERS.length)];
      }
    }
  }
}

function tryPlace(word, directions) {
  const letters = word.split('');
  const len = letters.length;

  for (let attempt = 0; attempt < 200; attempt++) {
    const dir = directions[randInt(directions.length)];
    const [dr, dc] = dir;
    const startR = randInt(GRID_SIZE);
    const startC = randInt(GRID_SIZE);

    const endR = startR + dr * (len - 1);
    const endC = startC + dc * (len - 1);
    if (endR < 0 || endR >= GRID_SIZE || endC < 0 || endC >= GRID_SIZE) continue;

    // בדוק שאין התנגשות
    let valid = true;
    for (let i = 0; i < len; i++) {
      const r = startR + dr * i;
      const c = startC + dc * i;
      if (grid[r][c] !== null && grid[r][c] !== letters[i]) {
        valid = false; break;
      }
    }
    if (!valid) continue;

    // שבץ
    for (let i = 0; i < len; i++) {
      const r = startR + dr * i;
      const c = startC + dc * i;
      grid[r][c] = letters[i];
    }
    return { start: [startR, startC], end: [endR, endC], direction: [dr, dc] };
  }
  return null;
}

// ───── רינדור ─────
function render() {
  const g = $('word-grid');
  g.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
  g.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.textContent = grid[r][c];
      // mouse
      cell.addEventListener('mousedown', onCellStart);
      cell.addEventListener('mouseenter', onCellMove);
      cell.addEventListener('mouseup', onCellEnd);
      // touch
      cell.addEventListener('touchstart', onTouchStart, { passive: false });
      g.appendChild(cell);
    }
  }
  document.addEventListener('mouseup', onCellEnd);
  document.addEventListener('touchend', onCellEnd);
  document.addEventListener('touchmove', onTouchMove, { passive: false });

  renderWords();
  markFoundCells();
}

function renderWords() {
  $('words-list').innerHTML = placedWords.map(w => `
    <div class="word-chip ${w.found ? 'found' : ''}" title="${esc(w.hint)}">${esc(w.word)}</div>
  `).join('');
  $('found-count').textContent = foundCount;
  $('total-count').textContent = placedWords.length;
  $('words-progress').textContent = foundCount;
  $('words-total').textContent = placedWords.length;
}

function markFoundCells() {
  document.querySelectorAll('.cell.found').forEach(c => c.classList.remove('found'));
  placedWords.filter(w => w.found).forEach(w => {
    const len = w.word.length;
    const [dr, dc] = w.direction;
    for (let i = 0; i < len; i++) {
      const r = w.start[0] + dr * i;
      const c = w.start[1] + dc * i;
      const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
      if (cell) cell.classList.add('found');
    }
  });
}

// ───── סלקציה ─────
function onCellStart(e) {
  e.preventDefault();
  isSelecting = true;
  selectionPath = [[parseInt(this.dataset.r), parseInt(this.dataset.c)]];
  updateSelection();
}

function onCellMove(e) {
  if (!isSelecting) return;
  const r = parseInt(this.dataset.r);
  const c = parseInt(this.dataset.c);
  extendSelection(r, c);
}

function onTouchStart(e) {
  e.preventDefault();
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (el && el.classList.contains('cell')) {
    isSelecting = true;
    selectionPath = [[parseInt(el.dataset.r), parseInt(el.dataset.c)]];
    updateSelection();
  }
}

function onTouchMove(e) {
  if (!isSelecting) return;
  e.preventDefault();
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (el && el.classList.contains('cell')) {
    const r = parseInt(el.dataset.r);
    const c = parseInt(el.dataset.c);
    extendSelection(r, c);
  }
}

function extendSelection(r, c) {
  if (selectionPath.length === 0) return;
  const [sr, sc] = selectionPath[0];

  // קבע כיוון מההתחלה
  const dr_total = r - sr;
  const dc_total = c - sc;
  const len = Math.max(Math.abs(dr_total), Math.abs(dc_total)) + 1;

  // בדוק שהכיוון לגיטימי (אופקי/אנכי/אלכסוני)
  if (dr_total !== 0 && dc_total !== 0 && Math.abs(dr_total) !== Math.abs(dc_total)) {
    // לא קו ישר - השאר את הראשון בלבד
    selectionPath = [[sr, sc]];
    updateSelection();
    return;
  }

  const ndr = dr_total === 0 ? 0 : dr_total / Math.abs(dr_total);
  const ndc = dc_total === 0 ? 0 : dc_total / Math.abs(dc_total);

  // בנה את הנתיב
  selectionPath = [];
  for (let i = 0; i < len; i++) {
    selectionPath.push([sr + ndr * i, sc + ndc * i]);
  }
  updateSelection();
}

function updateSelection() {
  document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
  selectionPath.forEach(([r, c]) => {
    const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if (cell) cell.classList.add('selected');
  });
}

function onCellEnd() {
  if (!isSelecting) return;
  isSelecting = false;
  checkSelection();
  selectionPath = [];
  document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
}

function checkSelection() {
  if (selectionPath.length < 2) return;

  const selected = selectionPath.map(([r, c]) => grid[r][c]).join('');
  const reversed = selected.split('').reverse().join('');

  const match = placedWords.find(w => !w.found && (w.word === selected || w.word === reversed));
  if (match) {
    match.found = true;
    foundCount++;
    toast(`✓ ${match.word}!`, 'success');
    renderWords();
    markFoundCells();
    if (foundCount === placedWords.length) {
      finishGame();
    }
  }
}

// ───── רמז ─────
function useHint() {
  if (hintsLeft <= 0) {
    toast('אין יותר רמזים', 'error');
    return;
  }
  const unfound = placedWords.filter(w => !w.found);
  if (unfound.length === 0) return;

  const target = unfound[randInt(unfound.length)];
  target.found = true;
  foundCount++;
  hintsLeft--;
  hintsUsed++;

  toast(`רמז: "${target.word}" נחשפה`, 'success');
  $('hints-left').textContent = hintsLeft;
  if (hintsLeft <= 0) $('hint-btn').disabled = true;

  renderWords();
  markFoundCells();

  if (foundCount === placedWords.length) finishGame();
}

// ───── טיימר ─────
function startTimer() {
  timer = 0;
  $('timer').textContent = '00:00';
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timer++;
    $('timer').textContent = fmtTime(timer);
  }, 1000);
}

// ───── סיום ─────
async function finishGame() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  // חישוב ניקוד: 100 לכל מילה - 5 לכל שנייה - 30 לכל רמז
  const wordsFound = placedWords.filter(w => w.found).length - hintsUsed;
  const baseScore = wordsFound * 100;
  const timeBonus = Math.max(0, 600 - timer * 2);
  const finalScore = Math.max(50, baseScore + timeBonus);

  $('final-time').textContent = fmtTime(timer);
  $('final-score').textContent = finalScore;
  $('final-hints').textContent = hintsUsed;

  let grade;
  if (timer < 60 && hintsUsed === 0) grade = '🏆 מהיר וחכם!';
  else if (timer < 120) grade = '⭐ מצוין!';
  else if (timer < 240) grade = '👍 כל הכבוד';
  else grade = '🎯 מצאת את הכל';
  $('grade').textContent = grade;

  $('game-area').style.display = 'none';
  $('final-screen').style.display = '';

  // שמור ניקוד
  if (sb) {
    try {
      let userName = 'אורח';
      if (currentUser) {
        userName = currentUser.user_metadata?.full_name ||
                  currentUser.user_metadata?.name ||
                  currentUser.email?.split('@')[0] ||
                  'תושב';
      }
      await sb.from('game_scores').insert({
        user_id: currentUser?.id || null,
        user_name: userName,
        game_type: 'wordsearch',
        score: finalScore,
        max_score: placedWords.length * 100,
        time_seconds: timer,
        details: { hints_used: hintsUsed }
      });
    } catch (e) { console.warn('Save:', e); }
  }

  const shareText = `מצאתי ${placedWords.length} מילים בתפזורת אופקים תוך ${fmtTime(timer)} וקיבלתי ${finalScore} נקודות! נסה גם: https://myofaqim.co.il/games-wordsearch`;
  $('share-btn').href = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
}

function restart() {
  $('final-screen').style.display = 'none';
  $('game-area').style.display = '';
  hintsLeft = 3;
  hintsUsed = 0;
  foundCount = 0;
  $('hints-left').textContent = hintsLeft;
  $('hint-btn').disabled = false;
  createGrid();
  render();
  startTimer();
}

async function init() {
  if (!window.supabase) { setTimeout(init, 200); return; }
  sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);
  const { data: { session } } = await sb.auth.getSession();
  if (session) currentUser = session.user;
  else $('auth-banner').style.display = 'flex';

  // התאם גודל מטריצה לפי המסך
  if (window.innerWidth < 480) GRID_SIZE = 11;
  else GRID_SIZE = 12;

  createGrid();
  render();
  startTimer();
}

window.useHint = useHint;
window.restart = restart;

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
