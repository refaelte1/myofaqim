# ============================================================
#  netlify.toml — MyOfaqim Netlify Configuration
# ============================================================

[build]
  publish = "."
  command = "echo 'Static site — no build step needed'"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── HTTP Headers ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(self)"
    # Performance
    X-DNS-Prefetch-Control     = "on"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Digital Asset Links — קישור הדומיין לאפליקציית האנדרואיד (TWA)
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type  = "application/json"
    Cache-Control = "public, max-age=3600"

# ── Redirects (rewrites, status 200) ─────────────────────────
# הערה: דפים עם קובץ .html תואם (למשל /deals → deals.html) מטופלים
# אוטומטית ע"י Netlify (pretty URLs) ואינם צריכים כלל כאן.

# כתובות נקיות לדפים פרטיים/אדמין
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

[[redirects]]
  from   = "/biz"
  to     = "/biz.html"
  status = 200

[[redirects]]
  from   = "/realestate"
  to     = "/realestate.html"
  status = 200

[[redirects]]
  from   = "/pricing"
  to     = "/pricing.html"
  status = 200

# דפים דינמיים: הדף קורא את ה-slug מה-URL
[[redirects]]
  from   = "/business/*"
  to     = "/business.html"
  status = 200

[[redirects]]
  from   = "/project/*"
  to     = "/project.html"
  status = 200

[[redirects]]
  from   = "/article/*"
  to     = "/article.html"
  status = 200

# כתבות בלוג: /blog/<slug> → blog-<slug>.html
[[redirects]]
  from   = "/blog/:slug"
  to     = "/blog-:slug.html"
  status = 200

# קישור ישן: /community → דף האירועים
[[redirects]]
  from   = "/community"
  to     = "/community-events.html"
  status = 301
