# ============================================================
#  netlify.toml — MyOfaqim Netlify Configuration
# ============================================================

[build]
  publish = "."
  command = "echo 'Static site — no build step needed'"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── HTTP Headers ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(self)"
    # Performance
    X-DNS-Prefetch-Control     = "on"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirects ────────────────────────────────────────────────
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

[[redirects]]
  from   = "/biz"
  to     = "/biz.html"
  status = 200

[[redirects]]
  from   = "/realestate"
  to     = "/realestate.html"
  status = 200

[[redirects]]
  from   = "/pricing"
  to     = "/pricing.html"
  status = 200

# Dynamic pages: /business/{slug}, /project/{slug}, /article/{slug}
# These rewrite to the static HTML page; the page reads the slug from URL.
[[redirects]]
  from   = "/business/*"
  to     = "/business.html"
  status = 200

[[redirects]]
  from   = "/project/*"
  to     = "/project.html"
  status = 200

[[redirects]]
  from   = "/article/*"
  to     = "/article.html"
  status = 200

# Dynamic sitemap.xml served by Netlify Function
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from   = "/businesses"
  to     = "/#businesses"
  status = 200

[[redirects]]
  from   = "/coupons"
  to     = "/#coupons"
  status = 200

[[redirects]]
  from   = "/news"
  to     = "/#news"
  status = 200

[[redirects]]
  from   = "/forum"
  to     = "/#forum"
  status = 200

[[redirects]]
  from   = "/community"
  to     = "/#community"
  status = 200

[[redirects]]
  from   = "/professionals"
  to     = "/#professionals"
  status = 200

# Catch-all for SPA routing (when full Next.js is added)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
