    background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.5) 100%);

  .biz-cover-empty {

    background: #fff; border-radius: 18px;

  .float-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);

  .float-btn.saved { color: #F59E0B; }
  .float-btn.saved svg { fill: #F59E0B; }
  .float-btn:hover { background: rgba(0,0,0,0.6); }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: #1A2E5C; color: #fff;
    padding: 12px 24px; border-radius: 100px;
    font-weight: 700; font-size: 14px; z-index: 99998;
    transition: transform .3s; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .biz-wrap { padding: 0 10px; margin-top: -60px; }
    .biz-head { padding: 18px 18px 16px; }
    .biz-logo { width: 70px; height: 70px; margin-top: -42px; font-size: 26px; }
    .biz-name { font-size: 19px; }
    .biz-actions { grid-template-columns: 1fr 1fr; }
    .biz-actions .action-btn:last-child { grid-column: span 2; }
    .biz-cover { height: 180px; }
  }
</style>

  if (!window.supabase) { setTimeout(init, 200); return; }
  sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);

  const { data: { session } } = await sb.auth.getSession();
  if (session) currentUser = session.user;

  // קבלת ה-id/slug מה-URL
  const params = new URLSearchParams(window.location.search);
  const idOrSlug = params.get('id') || params.get('slug') ||
    window.location.pathname.split('/').pop().replace('.html', '');

  if (!idOrSlug || idOrSlug === 'business') {
    showNotFound();
    return;
  }

  await loadBiz(idOrSlug);
}

async function loadBiz(idOrSlug) {
  try {
    // נסה תחילה לפי id, ואז לפי slug
    let { data, error } = await sb.from('businesses').select('*')
      .or(`id.eq.${idOrSlug.match(/^[0-9a-f-]{36}$/) ? idOrSlug : '00000000-0000-0000-0000-000000000000'},slug.eq.${idOrSlug}`)
      .limit(1)
      .maybeSingle();

    if (error || !data) {
      // נסה רק לפי slug
      const r2 = await sb.from('businesses').select('*').eq('slug', idOrSlug).maybeSingle();
      data = r2.data;
    }

    if (!data) {
      showNotFound();
      return;
    }

    // וודא שזה עסק פעיל (אלא אם אדמין/בעלים)
    const isAdmin = currentUser && (currentUser.email || '').toLowerCase() === 'refael@tedgi.co.il';
    const isOwner = currentUser && data.owner_id === currentUser.id;
    if (!data.is_active && !isAdmin && !isOwner) {
      showNotFound();
      return;
    }

    currentBiz = data;
    render(data);

    // tracking view
    if (typeof mofTrackView === 'function') mofTrackView(data.id);

    // טען מועדפים
    if (currentUser) {
      try {
        const { data: favs } = await sb.from('user_favorites').select('id')
          .eq('user_id', currentUser.id)
          .eq('item_type', 'business')
          .eq('item_id', data.id);
        if (favs && favs.length > 0) {
          isFav = true;
          $('fav-btn').classList.add('saved');
        }
      } catch {}
    }

    // טען קופונים פעילים
    try {
      const { data: coupons } = await sb.from('coupons').select('*')
        .eq('business_id', data.id)
        .eq('is_active', true)
        .order('display_order');
      if (coupons && coupons.length > 0) renderCoupons(coupons);
    } catch {}

  } catch (e) {
    console.error('Load biz error:', e);
    $('loading').innerHTML = `<p style="color:#DC2626">שגיאה: ${esc(e.message)}</p>`;
  }
}

  $('loading').style.display = 'none';
  $('not-found').style.display = '';
}

function renderHours(hours) {
  const today = new Date().getDay();
  const todayKey = DAY_ORDER[today];

  const rows = DAY_ORDER.map(key => {
    const d = hours[key];
    const isToday = key === todayKey;
    let timeText, statusClass, statusText;

    if (!d || d.closed) {
      timeText = 'סגור';
      statusClass = 'closed';
      statusText = isToday ? 'סגור היום' : '';
    } else if (d.open && d.close) {
      timeText = `${d.open} - ${d.close}`;
      // בדוק אם פתוח עכשיו (רק להיום)
      if (isToday) {
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const [oh, om] = d.open.split(':').map(Number);
        const [ch, cm] = d.close.split(':').map(Number);
        const openMin = oh * 60 + om;
        const closeMin = ch * 60 + cm;
        if (nowMin >= openMin && nowMin <= closeMin) {
          statusClass = 'open';
          statusText = 'פתוח עכשיו';
        } else {
          statusClass = 'closed';
          statusText = 'סגור עכשיו';
        }
      } else {
        statusText = '';
      }
    } else {
      timeText = '—';
    }

    return `
      <div class="hour-row ${isToday ? 'today' : ''}">
        <div class="day">${DAY_LABELS[key]}${isToday ? ' (היום)' : ''}</div>
        <div class="time">${esc(timeText)}</div>
        ${statusText ? `<div class="status ${statusClass}">${esc(statusText)}</div>` : '<div></div>'}
      </div>
    `;
  });
  $('hours-grid').innerHTML = rows.join('');
}

function renderCoupons(coupons) {
  $('coupons-list').innerHTML = coupons.map(c => {
    const discount = c.discount_type === 'percent' ? `${c.discount_value}% הנחה`
      : c.discount_type === 'amount' ? `₪${c.discount_value} הנחה`
      : c.discount_value ? `${c.discount_value}` : '';
    return `
      <a href="/deals?id=${c.id}" class="coupon-card" style="text-decoration:none;display:block" onclick="trackClick('coupon_view','${c.id}')">
        ${discount ? `<div class="coupon-discount">${esc(discount)}</div>` : ''}
        <div class="coupon-title">${esc(c.title)}</div>
        <div class="coupon-meta">
          ${c.expires_at ? `<span>תוקף עד: ${new Date(c.expires_at).toLocaleDateString('he-IL')}</span>` : ''}
          ${c.coupon_code ? `<span>קוד: <strong>${esc(c.coupon_code)}</strong></span>` : ''}
        </div>
      </a>
    `;
  }).join('');
  $('coupons-section').style.display = '';
}

async function toggleFav() {
  if (!currentUser) {
    if (typeof mofOpenAuth === 'function') mofOpenAuth();
    return;
  }
  try {
    if (isFav) {
      await sb.from('user_favorites').delete()
        .eq('user_id', currentUser.id)
        .eq('item_type', 'business')
        .eq('item_id', currentBiz.id);
      isFav = false;
      $('fav-btn').classList.remove('saved');
      toast('הוסר מהמועדפים');
    } else {
      await sb.from('user_favorites').insert({
        user_id: currentUser.id,
        item_type: 'business',
        item_id: currentBiz.id,
        item_data: {
          title: currentBiz.business_name || currentBiz.name,
          description: currentBiz.short_description || '',
          image: currentBiz.logo_url || currentBiz.cover_image_url
        }
      });
      isFav = true;
      $('fav-btn').classList.add('saved');
      toast('נשמר במועדפים');
    }
  } catch (e) {
    toast('שגיאה');
  }
}

function shareBiz() {
  const url = window.location.href;
  const text = currentBiz?.business_name || currentBiz?.name || 'עסק באופקים';
  if (navigator.share) {
    navigator.share({ title: text, url }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(url);
    toast('הקישור הועתק');
  }
}

function trackClick(type, couponId) {
  if (typeof mofTrackClick === 'function' && currentBiz) {
    mofTrackClick(currentBiz.id, type, null, couponId);
  }
}
