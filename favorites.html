<style>
  body { background: linear-gradient(180deg, var(--cream) 0%, #FFFFFF 100%); }

  .fav-hero {

    padding: 48px 24px 64px;

  @media (max-width: 480px) {

  }
</style>

<script>
'use strict';

// window.SB_URL מ-site.js (window.SB_URL)
// window.SB_KEY מ-site.js (window.SB_KEY)
let sb = null;
let currentUser = null;
let allFavs = [];
let currentFilter = 'all';

const LABELS = {
  business: 'עסק', professional: 'בעל מקצוע', coupon: 'קופון',
  synagogue: 'בית כנסת', article: 'מאמר', forum_post: 'פוסט פורום'
};

// פונקציית esc מ-site.js (window.esc)
function timeAgo(date) {
  if (!date) return '';
  const diff = (Date.now() - new Date(date).getTime()) / 1000;
  if (diff < 60) return 'עכשיו';
  if (diff < 3600) return `לפני ${Math.floor(diff/60)} דקות`;
  if (diff < 86400) return `לפני ${Math.floor(diff/3600)} שעות`;
  if (diff < 604800) return `לפני ${Math.floor(diff/86400)} ימים`;
  return new Date(date).toLocaleDateString('he-IL');
}

async function init() {
  if (!window.supabase) { setTimeout(init, 200); return; }
  sb = window.supabase.createClient(window.SB_URL, window.SB_KEY);

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    showNotLoggedIn();
    return;
  }
  currentUser = session.user;
  showUserCard(currentUser);
  document.getElementById('push-banner').style.display = '';
  updatePushBanner();
  await loadFavorites();
}

function showNotLoggedIn() {
  document.getElementById('fav-area').innerHTML = `
    <div class="state-msg">
      <div class="state-msg-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h3>נדרשת התחברות</h3>
      <p>כדי לצפות במועדפים שלך, אנא התחבר תחילה</p>
      <button class="btn-filled" onclick="if(typeof mofOpenAuth==='function')mofOpenAuth()">התחברות / הרשמה</button>
    </div>`;
}

function showUserCard(user) {
  const meta = user.user_metadata || {};
  const name = meta.full_name || meta.name || user.email?.split('@')[0] || 'משתמש';
  const initial = name.trim().charAt(0).toUpperCase();
  const picture = meta.picture || meta.avatar_url;

  document.getElementById('user-card').style.display = '';
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-email').textContent = user.email || '';
  const avatarEl = document.getElementById('user-avatar');
  avatarEl.innerHTML = picture
    ? `<img src="${picture}" alt="${name}" onerror="this.parentNode.textContent='${initial}'">`
    : initial;
}

async function loadFavorites() {
  try {
    const { data, error } = await sb.from('user_favorites')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    allFavs = data || [];
    render();
  } catch(e) {
    document.getElementById('fav-area').innerHTML = `
      <div class="state-msg">
        <h3>שגיאה בטעינה</h3>
        <p>${esc(e.message)}</p>
      </div>`;
  }
}

function render() {
  // Update counts
  const counts = { all: allFavs.length };
  ['business','coupon','professional','synagogue','article','forum_post'].forEach(t => {
    counts[t] = allFavs.filter(f => f.item_type === t).length;
  });
  Object.entries(counts).forEach(([k,v]) => {
    const el = document.getElementById('count-' + k);
    if (el) el.textContent = v;
  });

  document.getElementById('filter-bar').style.display = allFavs.length > 0 ? '' : 'none';

  if (allFavs.length === 0) {
    document.getElementById('fav-area').innerHTML = `
      <div class="state-msg">
        <div class="state-msg-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </div>
        <h3>עדיין אין לך מועדפים</h3>
        <p>לחיצה על הלב בכרטיסי עסקים, קופונים ובעלי מקצוע תוסיף אותם לכאן</p>
        <a href="/businesses" class="btn-filled">גלו עסקים</a>
      </div>`;
    return;
  }

  const items = currentFilter === 'all' ? allFavs : allFavs.filter(f => f.item_type === currentFilter);

  if (items.length === 0) {
    document.getElementById('fav-area').innerHTML = `
      <div class="state-msg">
        <h3>אין פריטים בקטגוריה זו</h3>
      </div>`;
    return;
  }

  document.getElementById('fav-area').innerHTML = `
    <div class="fav-grid">
      ${items.map(renderCard).join('')}
    </div>`;
}

function renderCard(fav) {
  const d = fav.item_data || {};
  const arrow = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;
  const links = {
    business: `/business?id=${fav.item_id}`,
    professional: '/professionals',
    coupon: '/deals',
    synagogue: '/synagogues',
    article: d.url || '/news',
    forum_post: `/forum?post=${fav.item_id}`
  };

  return `
    <div class="fav-card ${fav.item_type}">
      <button class="fav-remove" onclick="removeFav('${fav.id}')" title="הסר ממועדפים">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="label">${LABELS[fav.item_type] || fav.item_type}</span>
      <h3>${esc(d.title || d.name || 'ללא שם')}</h3>
      ${d.description || d.subtitle ? `<div class="meta">${esc(d.description || d.subtitle)}</div>` : ''}
      <div class="footer">
        <span>נשמר ${timeAgo(fav.created_at)}</span>
        <a href="${links[fav.item_type] || '/'}">פתח ${arrow}</a>
      </div>
    </div>`;
}

async function removeFav(favId) {
  if (!confirm('להסיר מהמועדפים?')) return;
  try {
    const { error } = await sb.from('user_favorites').delete().eq('id', favId);
    if (error) throw error;
    allFavs = allFavs.filter(f => f.id !== favId);
    render();
  } catch(e) { alert('שגיאה: ' + e.message); }
}

// ───── Filter ─────
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  });
});

// ───── Push Notifications ─────
const VAPID_PUBLIC_KEY = 'BIwLhM_dBVxBhWSWnDZqIH3WyiL-DjvAOmqyJfYjxOIzZw1XzAzpfPUOQRtTGEMa4PqfXk-zZSRshLqf0OPiKQM'; // יוחלף בעתיד

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
}

async function updatePushBanner() {
  const banner = document.getElementById('push-banner');
  const btn = document.getElementById('push-btn');
  const title = document.getElementById('push-title');
  const desc = document.getElementById('push-desc');

  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    banner.style.display = 'none';
    return;
  }

  if (Notification.permission === 'denied') {
    banner.classList.remove('enabled');
    title.textContent = 'התראות חסומות';
    desc.textContent = 'בהגדרות הדפדפן תוכל לאפשר התראות מאתר זה';
    btn.disabled = true;
    btn.textContent = 'חסום';
    return;
  }

  if (Notification.permission === 'granted') {
    // בודק אם יש מנוי פעיל
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      banner.classList.add('enabled');
      title.textContent = 'התראות פוש מופעלות';
      desc.textContent = 'תקבלו עדכון מיידי על קופונים חדשים וחדשות';
      btn.textContent = 'בטל';
      return;
    }
  }

  banner.classList.remove('enabled');
  title.textContent = 'הפעל התראות פוש';
  desc.textContent = 'קבלו עדכון מיידי על קופונים חדשים וחדשות בעיר';
  btn.textContent = 'הפעלה';
  btn.disabled = false;
}

async function togglePush() {
  const btn = document.getElementById('push-btn');
  btn.disabled = true;

  try {
    if (!('serviceWorker' in navigator)) {
      throw new Error('הדפדפן שלך לא תומך בהתראות');
    }

    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();

    if (existing) {
      // בטל מנוי
      await existing.unsubscribe();
      await sb.from('push_subscriptions').delete().eq('endpoint', existing.endpoint);
    } else {
      // הירשם
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') throw new Error('יש לאשר התראות בדפדפן');

      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });

      const subJson = sub.toJSON();
      await sb.from('push_subscriptions').upsert({
        user_id: currentUser?.id || null,
        endpoint: sub.endpoint,
        p256dh_key: subJson.keys.p256dh,
        auth_key: subJson.keys.auth,
        user_agent: navigator.userAgent.slice(0, 200),
        is_active: true
      }, { onConflict: 'endpoint' });

      // התראה ראשונה לאישור
      reg.showNotification('אופקים שלי', {
        body: 'נרשמת בהצלחה! תקבלו כאן עדכונים על קופונים וחדשות.',
        icon: '/icon-192.png',
        badge: '/icon-192.png',
        tag: 'welcome'
      });
    }

    await updatePushBanner();
  } catch (e) {
    alert('שגיאה: ' + e.message);
    btn.disabled = false;
  }
}

window.removeFav = removeFav;
window.togglePush = togglePush;

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
